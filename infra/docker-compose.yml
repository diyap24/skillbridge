version: '3.9'

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sbadmin
      POSTGRES_PASSWORD: sbsecret
      POSTGRES_DB: skillbridge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sbadmin -d skillbridge']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 7 ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: sb-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: sbadmin
      MONGO_INITDB_ROOT_PASSWORD: sbsecret
      MONGO_INITDB_DATABASE: skillbridge
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sb-redis
    restart: unless-stopped
    command: redis-server --requirepass sbsecret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ── Mongo Express (MongoDB browser UI) ────────────────────────────────────
  mongo-express:
    image: mongo-express
    container_name: sb-mongo-ui
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: sbadmin
      ME_CONFIG_MONGODB_ADMINPASSWORD: sbsecret
      ME_CONFIG_MONGODB_URL: mongodb://sbadmin:sbsecret@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb

# ── Persistent volumes ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:
  redis_data: